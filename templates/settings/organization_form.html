{% extends 'layouts/base.html' %}

{% block title %}Edit Organization - SaaS POS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4>Edit Organization</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Organization Name</label>
                        <input type="text" name="name" class="form-control" value="{{ object.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Subscription Plan</label>
                        <select name="subscription_plan" class="form-select">
                            <option value="free" {% if object.subscription_plan == 'free' %}selected{% endif %}>Free</option>
                            <option value="starter" {% if object.subscription_plan == 'starter' %}selected{% endif %}>Starter</option>
                            <option value="professional" {% if object.subscription_plan == 'professional' %}selected{% endif %}>Professional</option>
                            <option value="enterprise" {% if object.subscription_plan == 'enterprise' %}selected{% endif %}>Enterprise</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <a href="{% url 'settings:index' %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
